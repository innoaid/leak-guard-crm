<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Leak Guard — Job Board</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f5f5;--card:#fff;--bdr:#e5e7eb;--ink:#111;--mt:#6b7280;--pri:#2D2A6E;--acc:#1D9E75;--sh:0 1px 3px rgba(0,0,0,.08)}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);font-size:14px}

.hdr{background:var(--pri);color:#fff;padding:13px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hdr-t{font-size:17px;font-weight:800}.hdr-m{font-size:11px;opacity:.7}

.tabs{display:flex;background:#fff;border-bottom:.5px solid #E5E7EB;position:sticky;top:50px;z-index:90}
.tab{flex:1;padding:11px;text-align:center;font-size:13px;font-weight:700;color:var(--mt);cursor:pointer;border-bottom:3px solid transparent;transition:.15s}
.tab.on{color:var(--acc);border-bottom-color:var(--acc)}

.pg{display:none;padding:14px}.pg.on{display:block}
.err{background:#FEE2E2;color:#991B1B;padding:10px 16px;font-size:13px;font-weight:600;text-align:center;display:none}
.ld{text-align:center;padding:48px;color:var(--mt)}.sp{width:26px;height:26px;border:3px solid var(--bdr);border-top-color:var(--acc);border-radius:50%;animation:s .7s linear infinite;margin:0 auto 10px}@keyframes s{to{transform:rotate(360deg)}}

.ctrl{display:flex;gap:8px;margin-bottom:0;padding:10px 14px;flex-wrap:wrap;background:#fff;border-bottom:.5px solid #E5E7EB}
.ctrl input,.ctrl select{padding:7px 11px;background:#F9FAFB;border:.5px solid #D1D5DB;border-radius:6px;font-size:13px;font-family:inherit}
.ctrl input{flex:1;min-width:150px}.ctrl select{min-width:120px}

.kb{display:flex;gap:8px;overflow-x:auto;padding:10px 14px;background:#fff}
.kb::-webkit-scrollbar{height:5px}.kb::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
.kc{min-width:210px;max-width:230px;flex-shrink:0;display:flex;flex-direction:column;background:#fff;border:.5px solid rgba(0,0,0,.07);border-radius:8px;overflow:hidden}
.kh{padding:8px 10px;font-size:11px;font-weight:500;display:flex;justify-content:space-between;align-items:center}
.kn{padding:1px 6px;border-radius:16px;font-size:9px;font-weight:600}
.kb-body{flex:1;background:#F9FAFB;padding:5px;overflow-y:auto;max-height:calc(100vh - 200px)}
.cd{background:#fff;border:.5px solid #E5E7EB;border-radius:6px;padding:8px 9px;margin-bottom:4px;cursor:pointer;transition:.12s}
.cd:hover{border-color:#D1D5DB}
.cd-n{font-size:12px;font-weight:500;color:#111827;margin-bottom:2px}
.cd-prob{font-size:11px;color:#6B7280;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cd-loc{font-size:10px;color:#9CA3AF;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cd-slot{display:inline-block;margin-bottom:4px;padding:2px 7px;border-radius:8px;background:#FEF3C7;color:#92400E;font-size:10px;font-weight:500}
.cd-bot{display:flex;justify-content:space-between;align-items:center}
.cd-b{display:inline-block;padding:1px 6px;border-radius:10px;font-size:9px;font-weight:600}
.badge-ken{background:#EEF2FF;color:#3730A3}.badge-admin{background:#F1F5F9;color:#475569}
.badge-kl{background:#DCFCE7;color:#166534}.badge-jb{background:#FEF9C3;color:#854D0E}
.badge-none{background:#F1F5F9;color:#9CA3AF}
.cd-ph{color:#0F6E56;text-decoration:none;font-size:10px;font-weight:500}
.kc-e{text-align:center;padding:16px;color:var(--mt);font-size:10px}
.cd{position:relative}
.cd-cb{position:absolute;top:8px;right:8px;width:14px;height:14px;cursor:pointer;accent-color:#3B82F6}
.cd-actions{display:flex;gap:4px;margin-top:6px;border-top:.5px solid #F3F4F6;padding-top:6px}
.btn-next{flex:1;padding:4px 0;background:#1D9E75;color:#fff;border:none;border-radius:5px;font-size:10px;font-weight:500;cursor:pointer}
.btn-next:hover{background:#0F6E56}
.btn-jump{padding:4px 8px;background:#F3F4F6;color:#374151;border:none;border-radius:5px;font-size:10px;font-weight:500;cursor:pointer;flex-shrink:0}
.btn-jump:hover{background:#E5E7EB}

.met{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:12px}
.me{background:#fff;border:1px solid var(--bdr);border-radius:9px;padding:13px;text-align:center;box-shadow:var(--sh)}
.me-n{font-size:24px;font-weight:800;line-height:1.2}
.me-l{font-size:9px;color:var(--mt);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

.lc{background:#fff;border:1px solid var(--bdr);border-radius:8px;padding:11px;margin-bottom:6px;box-shadow:var(--sh)}
.lc-h{font-size:12px;font-weight:700;margin-bottom:2px}
.lc-m{font-size:11px;color:var(--mt);line-height:1.6}
.st{font-size:11px;font-weight:800;color:var(--mt);text-transform:uppercase;letter-spacing:.7px;margin:12px 0 6px}

.bc{display:flex;align-items:flex-end;gap:2px;height:100px;padding:4px 0}
.br{flex:1;background:var(--acc);border-radius:2px 2px 0 0;min-width:5px;position:relative;transition:.2s}
.br-l{position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);font-size:7px;color:var(--mt)}
.dw{display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap}
.dn{width:120px;height:120px;border-radius:50%}
.dl{font-size:10px;line-height:2}
.dd{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px}

.stb{width:100%;border-collapse:collapse;font-size:11px;margin-top:5px}
.stb th{background:var(--pri);color:#fff;padding:6px 8px;text-align:left;font-size:9px;text-transform:uppercase;letter-spacing:.4px}
.stb td{padding:6px 8px;border-bottom:1px solid var(--bdr)}
.stb tr:nth-child(even) td{background:#fafafa}

.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:14px}
.mo.open{display:flex}
.ml{background:#fff;border-radius:12px;max-width:460px;width:100%;max-height:85vh;overflow-y:auto;padding:20px}
.mx{float:right;background:none;border:none;font-size:18px;cursor:pointer;color:var(--mt)}
.ml h3{font-size:15px;font-weight:800;margin-bottom:10px}
.mr{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #f3f4f6;font-size:11px}
.mr-l{color:var(--mt);font-weight:500}.mr-v{font-weight:600;text-align:right;max-width:60%}

.tl{display:flex;align-items:flex-start;margin:12px 0;overflow-x:auto}
.ts{text-align:center;min-width:50px}
.td{width:12px;height:12px;border-radius:50%;margin:0 auto 2px;border:2px solid var(--bdr);background:#fff}
.td.done{background:var(--acc);border-color:var(--acc)}
.td.act{background:var(--pri);border-color:var(--pri)}
.tla{font-size:7px;color:var(--mt);font-weight:600}
.tld{font-size:7px;color:var(--ink);font-weight:700}
.tly{font-size:6px;color:var(--acc)}
.tll{flex:1;height:2px;background:var(--bdr);margin-top:6px;min-width:10px}
.tll.done{background:var(--acc)}

.mp select{padding:7px 11px;border:1px solid var(--bdr);border-radius:7px;font-size:13px;font-family:inherit;margin-bottom:12px}

@media(max-width:700px){.kb{flex-direction:column}.kc{min-width:100%;max-width:100%}.kb-body{max-height:260px}.met{grid-template-columns:1fr 1fr}#tds{grid-template-columns:1fr!important}.dw{flex-direction:column}}
</style>
</head>
<body>
<div class="hdr"><div class="hdr-t">🔒 Leak Guard — Job Board</div><div class="hdr-m" id="upd">Loading...</div></div>
<div class="err" id="err">Could not load data — retrying...</div>
<div class="tabs"><div class="tab on" onclick="sT('kanban',this)">Kanban</div><div class="tab" onclick="sT('today',this)">Today</div><div class="tab" onclick="sT('monthly',this)">Monthly</div></div>
<div id="ldEl" class="ld"><div class="sp"></div>Loading data...</div>

<div class="pg on" id="pg-kanban">
<div class="ctrl"><input type="text" id="kS" placeholder="Search name, phone, location..." oninput="rK()"><select id="kA" onchange="rK()"><option value="">All Staff</option></select></div>
<div id="bulkBar" style="display:none;background:#2D2A6E;color:#fff;padding:9px 14px;align-items:center;gap:10px;border-bottom:2px solid #1D9E75">
  <span id="bulkCount" style="font-size:12px;font-weight:500;flex:1"></span>
  <select id="bulkStatus" style="padding:5px 9px;border-radius:6px;font-size:11px;border:none;background:rgba(255,255,255,0.15);color:#fff;font-family:inherit">
    <option value="">Move to...</option><option>New Lead</option><option>Pending Site Visit</option><option>Site Visit Confirmed</option><option>Pending QT</option><option>Quotation Sent</option><option>Follow Up</option><option>Pending I.Date</option><option>I.Date Confirmed</option><option>Job In Progress</option><option>Job Complete</option><option>Receipt Sent</option><option>Cold Lead</option><option>Lost</option><option>Rejected</option><option>Out of Area</option><option>Human Handoff</option>
  </select>
  <button onclick="bulkMove()" style="padding:5px 14px;background:#1D9E75;color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer">Move</button>
  <button onclick="clearSelection()" style="padding:5px 10px;background:rgba(255,255,255,0.1);color:#fff;border:none;border-radius:6px;font-size:11px;cursor:pointer">Cancel</button>
</div>
<div class="kb" id="kB"></div>
</div>

<div class="pg" id="pg-today"><div class="met" id="tM"></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px" id="tds"></div></div>

<div class="pg" id="pg-monthly"><div class="mp"><select id="mS" onchange="rM()"></select></div><div id="mC"></div></div>

<div class="mo" id="mO" onclick="if(event.target===this)cM()"><div class="ml" id="mB"></div></div>

<div id="moveOverlay" style="display:none;background:rgba(0,0,0,0.5);position:fixed;inset:0;z-index:300;align-items:center;justify-content:center;padding:16px">
  <div style="background:#fff;border-radius:10px;width:100%;max-width:340px;overflow:hidden">
    <div style="padding:12px 16px;border-bottom:.5px solid #E5E7EB;display:flex;justify-content:space-between;align-items:center">
      <span id="moveTitle" style="font-size:13px;font-weight:500"></span>
      <button onclick="closeMoveModal()" style="background:none;border:none;color:#9CA3AF;font-size:18px;cursor:pointer">&times;</button>
    </div>
    <div style="padding:14px 16px">
      <div id="moveLeadInfo" style="font-size:11px;color:#6B7280;margin-bottom:12px"></div>
      <div id="moveDateRow" style="display:none;margin-bottom:10px">
        <div style="font-size:10px;font-weight:500;color:#6B7280;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Required Date</div>
        <input type="datetime-local" id="moveDate" style="width:100%;padding:7px 10px;border:.5px solid #D1D5DB;border-radius:6px;font-size:12px;font-family:inherit;background:#F9FAFB">
        <div style="font-size:10px;color:#F59E0B;margin-top:3px">&#9888; Required to move to this status</div>
      </div>
    </div>
    <div style="padding:10px 16px;border-top:.5px solid #E5E7EB;display:flex;gap:8px;justify-content:flex-end">
      <button onclick="closeMoveModal()" style="padding:6px 12px;background:#F3F4F6;color:#374151;border:none;border-radius:6px;font-size:12px;cursor:pointer">Cancel</button>
      <button onclick="confirmMove()" style="padding:6px 16px;background:#1D9E75;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer">Confirm</button>
    </div>
  </div>
</div>

<script>
var D=[],SU='https://docs.google.com/spreadsheets/d/17lxgFT5bW-5mcnM-ks2hid1ZI0Icp6ieK7huD3ffWBE/gviz/tq?tqx=out:json&sheet=Leak+Guard+Leads';
var KC=[
{s:'New Lead',bg:'#EEF2FF',fg:'#3730A3',bb:'#C7D2FE',bf:'#3730A3'},
{s:'Pending Site Visit',bg:'#FFFBEB',fg:'#92400E',bb:'#FDE68A',bf:'#92400E'},
{s:'Site Visit Confirmed',bg:'#EEEDFE',fg:'#3C3489',bb:'#CECBF6',bf:'#3C3489'},
{s:'Pending QT',bg:'#FDF2F8',fg:'#9D174D',bb:'#FBCFE8',bf:'#9D174D'},
{s:'Quotation Sent',bg:'#FFF4EE',fg:'#9A3412',bb:'#FED7AA',bf:'#9A3412'},
{s:'Follow Up',bg:'#FFF7ED',fg:'#9A3412',bb:'#FED7AA',bf:'#9A3412'},
{s:'Pending I.Date',bg:'#E0F2FE',fg:'#0C4A6E',bb:'#BAE6FD',bf:'#0C4A6E'},
{s:'I.Date Confirmed',bg:'#F0FDFA',fg:'#134E4A',bb:'#99F6E4',bf:'#134E4A'},
{s:'Job In Progress',bg:'#E0F7FA',fg:'#164E63',bb:'#A5F3FC',bf:'#164E63'},
{s:'Job Complete',bg:'#E1F5EE',fg:'#085041',bb:'#9FE1CB',bf:'#085041'},
{s:'Receipt Sent',bg:'#ECFDF5',fg:'#064E3B',bb:'#A7F3D0',bf:'#064E3B'},
{s:'Cold Lead',bg:'#F5F2EC',fg:'#6B6155',bb:'#E2DAD0',bf:'#6B6155'},
{s:'Lost',bg:'#FEF2F2',fg:'#991B1B',bb:'#FECACA',bf:'#991B1B'},
{s:'Rejected',bg:'#FEF2F2',fg:'#7F1D1D',bb:'#FECACA',bf:'#7F1D1D'},
{s:'Out of Area',bg:'#FAF5FF',fg:'#6B21A8',bb:'#E9D5FF',bf:'#6B21A8'},
{s:'Human Handoff',bg:'#FFF1F3',fg:'#9F1239',bb:'#FECDD3',bf:'#9F1239'}];

function $(id){return document.getElementById(id)}
function fd(v){if(!v)return'—';var d=new Date(v);return isNaN(d)?String(v).substring(0,10):d.toLocaleDateString('en-MY',{day:'numeric',month:'short',year:'numeric'})}
function fn(n){return n?Number(n).toLocaleString('en-MY'):'—'}
function iT(v){if(!v)return!1;var d=new Date(v),t=new Date();return d.getDate()===t.getDate()&&d.getMonth()===t.getMonth()&&d.getFullYear()===t.getFullYear()}
function dB(a,b){if(!a||!b)return null;var x=new Date(a),y=new Date(b);return isNaN(x)||isNaN(y)?null:Math.round((y-x)/864e5)}
function cv(r,i,useFmt){var c=r.c?r.c[i]:null;if(!c||c.v==null)return'';if(useFmt&&c.f)return c.f;return c.v}

async function load(){
  try{
    $('err').style.display='none';
    var r=await fetch(SU+'&nocache='+Date.now()),t=await r.text(),j=JSON.parse(t.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
    D=j.table.rows.map(function(r){return{
      ts:cv(r,0),ph:cv(r,1),nm:cv(r,2),pr:cv(r,3),lo:cv(r,4),ad:cv(r,5),
      sl:cv(r,6),st:cv(r,7),ss:cv(r,8),at:cv(r,9),qt:cv(r,10),jo:cv(r,11),
      no:cv(r,12),ci:cv(r,13),dli:cv(r,18,1),dac:cv(r,19,1),dqi:cv(r,20,1),
      dc:cv(r,21,1),din:cv(r,22,1),sca:cv(r,23,1)}});
    $('ldEl').style.display='none';
    $('upd').textContent='Updated: '+new Date().toLocaleTimeString('en-MY',{hour:'2-digit',minute:'2-digit'});
    bAD();if(!$('mS').options.length)iMP();rAll();
  }catch(e){$('err').style.display='block';$('ldEl').innerHTML=''}
}

function bAD(){var s=$('kA'),p=s.value,n={};D.forEach(function(d){if(d.at)n[d.at]=1});s.innerHTML='<option value="">All Staff</option>';Object.keys(n).sort().forEach(function(k){var o=document.createElement('option');o.value=k;o.textContent=k;s.appendChild(o)});s.value=p}
function sT(n,e){document.querySelectorAll('.pg').forEach(function(p){p.classList.remove('on')});document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on')});$('pg-'+n).classList.add('on');e.classList.add('on')}
function rAll(){rK();rTd();rM()}

function bCls(n){if(!n)return'badge-none';if(n==='Ken')return'badge-ken';if(n==='Admin')return'badge-admin';if(n==='Team KL')return'badge-kl';if(n==='Team JB')return'badge-jb';return'badge-none'}

// Selection state
var selectedCards=new Set();
function toggleSelect(idx){if(selectedCards.has(idx))selectedCards.delete(idx);else selectedCards.add(idx);updateBulkBar()}
function updateBulkBar(){var bar=$('bulkBar'),cnt=$('bulkCount');if(selectedCards.size>0){bar.style.display='flex';cnt.textContent=selectedCards.size+' selected'}else{bar.style.display='none'}}
function clearSelection(){selectedCards.clear();document.querySelectorAll('.cd-cb').forEach(function(cb){cb.checked=false});updateBulkBar()}

// Move modal state
var DATE_REQUIRED=['Site Visit Confirmed','I.Date Confirmed'];
var DATE_AUTO=['Quotation Sent','Job Complete'];
var DATE_COL_MAP={'Site Visit Confirmed':19,'Quotation Sent':20,'I.Date Confirmed':21,'Job Complete':22};
var moveTargetIdx=null,moveTargetStatus=null;
var WEBAPP_URL='https://script.google.com/macros/s/AKfycbzUlf76a-FfkIIKwrjFnbxoyC4i0Ick2f40IzzzvbP2bhnRu2xE0O_F09xzmTx08Mud7Q/exec';

function initMove(idx,status){
  moveTargetIdx=idx;moveTargetStatus=status;var d=D[idx];
  $('moveTitle').textContent='Move to '+status;
  $('moveLeadInfo').innerHTML='Lead: <strong>'+(d.nm||d.ph||'—')+'</strong>';
  $('moveDateRow').style.display=DATE_REQUIRED.indexOf(status)!==-1?'block':'none';
  $('moveDate').value='';
  var jsr=$('jumpStatusRow');if(jsr)jsr.style.display='none';
  $('moveOverlay').style.display='flex';
}

function initJump(idx){
  var d=D[idx];moveTargetIdx=idx;moveTargetStatus=null;
  $('moveTitle').textContent='Jump to status';
  $('moveLeadInfo').innerHTML='Lead: <strong>'+(d.nm||d.ph||'—')+'</strong> · <span style="color:#6B7280">'+d.ss+'</span>';
  var existing=$('jumpStatusRow');
  if(!existing){
    var row=document.createElement('div');row.id='jumpStatusRow';row.style.marginBottom='10px';
    row.innerHTML='<div style="font-size:10px;font-weight:500;color:#6B7280;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Move to</div><select id="jumpStatusSel" onchange="onJumpSelect()" style="width:100%;padding:7px 10px;border:.5px solid #D1D5DB;border-radius:6px;font-size:12px;font-family:inherit;background:#F9FAFB"><option value="">Select status...</option>'+KC.map(function(k){return'<option>'+k.s+'</option>'}).join('')+'</select>';
    $('moveDateRow').parentNode.insertBefore(row,$('moveDateRow'));
  }else{existing.style.display='block';$('jumpStatusSel').value=''}
  $('moveDateRow').style.display='none';$('moveDate').value='';
  $('moveOverlay').style.display='flex';
}

function onJumpSelect(){moveTargetStatus=$('jumpStatusSel').value;$('moveDateRow').style.display=DATE_REQUIRED.indexOf(moveTargetStatus)!==-1?'block':'none';$('moveDate').value=''}
function closeMoveModal(){$('moveOverlay').style.display='none';var jsr=$('jumpStatusRow');if(jsr)jsr.style.display='none'}

async function confirmMove(){
  if(!moveTargetStatus){alert('Please select a status.');return}
  var dateVal='';
  if(DATE_REQUIRED.indexOf(moveTargetStatus)!==-1){dateVal=$('moveDate').value;if(!dateVal){alert('Please fill in the required date.');return}}
  else if(DATE_AUTO.indexOf(moveTargetStatus)!==-1){dateVal=new Date().toISOString()}
  var d=D[moveTargetIdx];
  try{
    var res=await fetch(WEBAPP_URL,{method:'POST',headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'updateStatus',phone:d.ph,status:moveTargetStatus,changedBy:'Web',statusChangedAt:new Date().toISOString(),dateCol:DATE_COL_MAP[moveTargetStatus]||null,dateVal:dateVal||null})});
    var j=await res.json();
    if(j.status==='ok'){d.ss=moveTargetStatus;d.sca=new Date().toISOString();closeMoveModal();clearSelection();rK()}
    else{alert('Error: '+(j.message||'Unknown'))}
  }catch(e){alert('Failed to update.');console.error(e)}
}

async function bulkMove(){
  var status=$('bulkStatus').value;
  if(!status){alert('Select a status.');return}
  if(DATE_REQUIRED.indexOf(status)!==-1){alert('This status requires a date. Move cards individually.');return}
  var autoDate=DATE_AUTO.indexOf(status)!==-1?new Date().toISOString():null;
  var idxs=Array.from(selectedCards),errors=0;
  for(var i=0;i<idxs.length;i++){
    var d=D[idxs[i]];
    try{
      var res=await fetch(WEBAPP_URL,{method:'POST',headers:{'Content-Type':'text/plain'},
        body:JSON.stringify({action:'updateStatus',phone:d.ph,status:status,changedBy:'Web',statusChangedAt:new Date().toISOString(),dateCol:DATE_COL_MAP[status]||null,dateVal:autoDate})});
      var j=await res.json();if(j.status==='ok'){d.ss=status;d.sca=new Date().toISOString()}else errors++
    }catch(e){errors++}
  }
  if(errors)alert(errors+' card(s) failed.');
  clearSelection();rK();
}

function rK(){
  var q=($('kS').value||'').toLowerCase().trim(),af=$('kA').value;
  var statusList=KC.map(function(k){return k.s});
  var f=D.filter(function(d){if(af&&d.at!==af)return!1;if(q&&!(d.nm+' '+d.ph+' '+d.lo+' '+d.pr+' '+d.ad).toLowerCase().includes(q))return!1;return!0});
  $('kB').innerHTML=KC.map(function(col){
    var it=f.filter(function(d){return d.ss===col.s});
    return'<div class="kc"><div class="kh" style="background:'+col.bg+';color:'+col.fg+'">'+col.s+' <span class="kn" style="background:'+col.bb+';color:'+col.bf+'">'+it.length+'</span></div><div class="kb-body">'+
    (it.length?it.map(function(d){var i=D.indexOf(d);
      var nextSt=statusList[statusList.indexOf(d.ss)+1]||null;
      var chk=selectedCards.has(i)?' checked':'';
      return'<div class="cd" onclick="oM('+i+')">'+
        '<input type="checkbox" class="cd-cb"'+chk+' onclick="event.stopPropagation();toggleSelect('+i+')" style="position:absolute;top:8px;right:8px;width:14px;height:14px;cursor:pointer;accent-color:#3B82F6">'+
        '<div class="cd-n">'+(d.nm||d.ph||'—')+'</div>'+
        (d.pr?'<div class="cd-prob">'+d.pr+'</div>':'')+
        '<div class="cd-loc">'+(d.lo||'—')+(d.sl?' · '+d.sl+' sqft':'')+'</div>'+
        (d.st?'<div class="cd-slot">'+fd(d.st)+'</div>':'')+
        '<div class="cd-bot">'+
          '<span class="cd-b '+bCls(d.at)+'">'+(d.at||'Unassigned')+'</span>'+
          (d.ph?'<a class="cd-ph" href="tel:'+d.ph+'" onclick="event.stopPropagation()">'+d.ph+'</a>':'')+
        '</div>'+
        '<div class="cd-actions">'+
          (nextSt?'<button class="btn-next" onclick="event.stopPropagation();initMove('+i+',\''+nextSt.replace(/'/g,"\\'")+'\')">Next</button>':'')+
          '<button class="btn-jump" onclick="event.stopPropagation();initJump('+i+')">Jump ▾</button>'+
        '</div></div>'
    }).join(''):'<div class="kc-e">No jobs</div>')+'</div></div>';
  }).join('');
}

function oM(i){
  var d=D[i];if(!d)return;
  var fl=[['Name',d.nm],['Phone',d.ph?'<a href="tel:'+d.ph+'">'+d.ph+'</a>':''],['Problem',d.pr],['Location',d.lo],['Address',d.ad],['Slab Size',d.sl?d.sl+' sqft':''],['Slot',d.st],['Status',d.ss],['Assigned',d.at],['Quotation',d.qt?'RM '+fn(d.qt):''],['Outcome',d.jo],['Notes',d.no],['Conv ID',d.ci]];
  var sg=[{l:'Lead In',d:d.dli},{l:'Appt Confirmed',d:d.dac},{l:'QT Issued',d:d.dqi},{l:'Confirmed',d:d.dc},{l:'Installed',d:d.din}];
  var la=-1;sg.forEach(function(x,i){if(x.d)la=i});
  var tlParts=[];
  sg.forEach(function(x,i){
    var dn=i<=la&&x.d,dy=i>0&&sg[i-1].d&&x.d?dB(sg[i-1].d,x.d):null;
    if(i>0) tlParts.push('<div class="tll'+(dn?' done':'')+'"></div>');
    tlParts.push('<div class="ts"><div class="td'+(dn?' done':'')+(i===la&&x.d?' act':'')+'"></div><div class="tla">'+x.l+'</div>'+(x.d?'<div class="tld">'+fd(x.d)+'</div>':'')+(dy!==null?'<div class="tly">'+dy+'d</div>':'')+'</div>');
  });
  var tl='<div class="tl">'+tlParts.join('')+'</div>';
  $('mB').innerHTML='<button class="mx" onclick="cM()">&times;</button><h3>'+(d.nm||d.ph||'Lead')+'</h3>'+tl+
    fl.filter(function(f){return f[1]}).map(function(f){return'<div class="mr"><span class="mr-l">'+f[0]+'</span><span class="mr-v">'+f[1]+'</span></div>'}).join('');
  $('mO').classList.add('open');
}
function cM(){$('mO').classList.remove('open')}

function rTd(){
  var nT=D.filter(function(d){return iT(d.dli)}).length;
  var cT=D.filter(function(d){return iT(d.sca)}).length;
  var svT=D.filter(function(d){return d.st&&iT(d.st)});
  var dT=D.filter(function(d){return iT(d.din)}).length;
  $('tM').innerHTML=[{n:nT,l:'New Leads Today',c:'#3B82F6'},{n:cT,l:'Status Changes',c:'#F59E0B'},{n:svT.length,l:'Site Visits Today',c:'#8B5CF6'},{n:dT,l:'Completed Today',c:'#1D9E75'}].map(function(m){return'<div class="me"><div class="me-n" style="color:'+m.c+'">'+m.n+'</div><div class="me-l">'+m.l+'</div></div>'}).join('');
  var svH=svT.length?svT.map(function(d){return'<div class="lc"><div class="lc-h">'+(d.nm||d.ph||'—')+'</div><div class="lc-m">📍 '+(d.ad||'—')+'<br>📞 '+(d.ph||'—')+' · 👷 '+(d.at||'—')+(d.sl?' · 📐 '+d.sl+' sqft':'')+'</div></div>'}).join(''):'<div class="lc" style="text-align:center;color:var(--mt)">No site visits today</div>';
  var rc=D.filter(function(d){return d.sca}).sort(function(a,b){return new Date(b.sca)-new Date(a.sca)}).slice(0,20);
  var rH=rc.length?rc.map(function(d){return'<div class="lc"><div class="lc-h">'+(d.nm||d.ph||'—')+'</div><div class="lc-m">→ <strong>'+d.ss+'</strong> · '+(d.at||'')+' · '+fd(d.sca)+'</div></div>'}).join(''):'<div class="lc" style="text-align:center;color:var(--mt)">No recent activity</div>';
  $('tds').innerHTML='<div><div class="st">Today\'s Site Visits</div>'+svH+'</div><div><div class="st">Recent Activity</div>'+rH+'</div>';
}

function iMP(){var s=$('mS'),n=new Date(),mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];for(var m=n.getMonth();m>=0;m--){var o=document.createElement('option');o.value=n.getFullYear()+'-'+m;o.textContent=mn[m]+' '+n.getFullYear();s.appendChild(o)}for(var m2=11;m2>=0;m2--){var o2=document.createElement('option');o2.value=(n.getFullYear()-1)+'-'+m2;o2.textContent=mn[m2]+' '+(n.getFullYear()-1);s.appendChild(o2)}}
function iM(v,y,m){if(!v)return!1;var d=new Date(v);return d.getMonth()===m&&d.getFullYear()===y}

function rM(){
  var p=$('mS').value.split('-'),yr=+p[0],mo=+p[1];
  var mL=D.filter(function(d){return iM(d.ts,yr,mo)});
  var mSV=D.filter(function(d){return iM(d.dac,yr,mo)});
  var mQ=D.filter(function(d){return iM(d.dqi,yr,mo)});
  var mC=D.filter(function(d){return iM(d.dc,yr,mo)});
  var mD=D.filter(function(d){return iM(d.din,yr,mo)});
  var cv=mL.length?(mD.length/mL.length*100).toFixed(1):0;

  var aS=['New Lead','Pending Site Visit','Site Visit Confirmed','Pending QT','Quotation Sent','Follow Up','Pending I.Date','I.Date Confirmed','Job In Progress'];
  var pS=['Pending I.Date','I.Date Confirmed','Job In Progress'];
  var pipe=D.filter(function(d){return aS.indexOf(d.ss)>=0}).reduce(function(s,d){return s+(+d.qt||0)},0);
  var coll=mD.reduce(function(s,d){return s+(+d.qt||0)},0);
  var pend=D.filter(function(d){return pS.indexOf(d.ss)>=0}).reduce(function(s,d){return s+(+d.qt||0)},0);

  var dim=new Date(yr,mo+1,0).getDate(),dy=[];
  for(var i=1;i<=dim;i++)dy.push(mL.filter(function(d){return new Date(d.ts).getDate()===i}).length);
  var mx=Math.max.apply(null,dy)||1;
  var bars=dy.map(function(c,i){var day=i+1;var showLbl=(day===1||(day%5===0));return'<div class="br" style="height:'+Math.max(2,c/mx*100)+'%" title="Day '+day+': '+c+'">'+(showLbl?'<div class="br-l">'+day+'</div>':'')+'</div>'}).join('');

  var sc={},tot=D.length||1;D.forEach(function(d){if(d.ss)sc[d.ss]=(sc[d.ss]||0)+1});
  var dcl={'New Lead':'#3B82F6','Pending Site Visit':'#F59E0B','Site Visit Confirmed':'#6366F1','Pending QT':'#EC4899','Quotation Sent':'#F97316','Job In Progress':'#06B6D4','Job Complete':'#1D9E75','Lost':'#EF4444','Cold Lead':'#94A3B8','Follow Up':'#FB923C'};
  var gp=[],pc=0,lg='';
  var donutSegs=[];
  Object.keys(sc).sort(function(a,b){return sc[b]-sc[a]}).slice(0,6).forEach(function(st){var pv=sc[st]/tot*100;var cl=dcl[st]||'#9CA3AF';gp.push(cl+' '+pc+'% '+(pc+pv)+'%');donutSegs.push({pct:pv,col:cl});pc+=pv;lg+='<div><span class="dd" style="background:'+cl+'"></span>'+st+' ('+sc[st]+')</div>'});
  // Build SVG donut with centre hole
  var svgR=50,svgIR=30,svgC=60;
  var svgPaths='',ang=0;
  donutSegs.forEach(function(seg){var a1=ang*Math.PI/180,a2=(ang+seg.pct*3.6)*Math.PI/180;
    var la=seg.pct>50?1:0;
    var ox=svgC+svgR*Math.cos(a1),oy=svgC+svgR*Math.sin(a1),ex=svgC+svgR*Math.cos(a2),ey=svgC+svgR*Math.sin(a2);
    var ix=svgC+svgIR*Math.cos(a2),iy=svgC+svgIR*Math.sin(a2),jx=svgC+svgIR*Math.cos(a1),jy=svgC+svgIR*Math.sin(a1);
    svgPaths+='<path d="M'+ox+','+oy+' A'+svgR+','+svgR+' 0 '+la+' 1 '+ex+','+ey+' L'+ix+','+iy+' A'+svgIR+','+svgIR+' 0 '+la+' 0 '+jx+','+jy+' Z" fill="'+seg.col+'"/>';
    ang+=seg.pct*3.6});
  var donutSvg='<svg width="120" height="120" viewBox="0 0 120 120">'+svgPaths+'<text x="60" y="63" text-anchor="middle" font-size="14" font-weight="800" fill="#111">'+tot+'</text></svg>';

  var klP=/kuala lumpur|kl|selangor|pj|petaling|klang|shah alam|subang|puchong|cheras|ampang|kajang|cyberjaya|putrajaya|kepong|damansara/i;
  var jbP=/johor|jb|johor bahru|skudai|iskandar|kempas|tampoi|larkin|tebrau/i;
  function bs(rows){return{l:rows.length,c:rows.filter(function(d){return d.dc}).length,d:rows.filter(function(d){return d.din}).length,r:rows.filter(function(d){return d.ss==='Job Complete'}).reduce(function(s,d){return s+(+d.qt||0)},0)}}
  var kl=bs(D.filter(function(d){return klP.test(d.lo+' '+d.ad)})),jb=bs(D.filter(function(d){return jbP.test(d.lo+' '+d.ad)}));

  $('mC').innerHTML=
    '<div class="met">'+[{n:mL.length,l:'New Leads',c:'#3B82F6'},{n:mSV.length,l:'SV Confirmed',c:'#6366F1'},{n:mQ.length,l:'Quotes Sent',c:'#F97316'},{n:mC.length,l:'Confirmed',c:'#10B981'},{n:mD.length,l:'Completed',c:'#1D9E75'},{n:cv+'%',l:'Conversion',c:'#2D2A6E'}].map(function(m){return'<div class="me"><div class="me-n" style="color:'+m.c+'">'+m.n+'</div><div class="me-l">'+m.l+'</div></div>'}).join('')+'</div>'+
    '<div class="met">'+[{n:'RM '+fn(pipe),l:'Pipeline',c:'#F59E0B'},{n:'RM '+fn(coll),l:'Collected',c:'#1D9E75'},{n:'RM '+fn(pend),l:'Pending',c:'#F97316'}].map(function(m){return'<div class="me"><div class="me-n" style="color:'+m.c+'">'+m.n+'</div><div class="me-l">'+m.l+'</div></div>'}).join('')+'</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:12px 0">'+
    '<div style="background:#fff;border:1px solid var(--bdr);border-radius:9px;padding:12px;box-shadow:var(--sh)"><div class="st" style="margin-top:0">Leads per Day</div><div class="bc">'+bars+'</div></div>'+
    '<div style="background:#fff;border:1px solid var(--bdr);border-radius:9px;padding:12px;box-shadow:var(--sh)"><div class="st" style="margin-top:0">Status Breakdown</div><div class="dw">'+donutSvg+'<div class="dl">'+lg+'</div></div></div></div>'+
    '<div style="background:#fff;border:1px solid var(--bdr);border-radius:9px;padding:12px;margin-top:12px;box-shadow:var(--sh)"><div class="st" style="margin-top:0">KL vs JB</div>'+
    '<table class="stb"><thead><tr><th>Branch</th><th>New Leads</th><th>Confirmed</th><th>Completed</th><th>Revenue</th></tr></thead><tbody>'+
    '<tr><td><strong>KL / Selangor</strong></td><td>'+kl.l+'</td><td>'+kl.c+'</td><td>'+kl.d+'</td><td>RM '+fn(kl.r)+'</td></tr>'+
    '<tr><td><strong>Johor / JB</strong></td><td>'+jb.l+'</td><td>'+jb.c+'</td><td>'+jb.d+'</td><td>RM '+fn(jb.r)+'</td></tr></tbody></table></div>';
}

document.addEventListener('keydown',function(e){if(e.key==='Escape')cM()});
load();setInterval(load,60000);
</script>
